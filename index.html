<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BountyMaster">
<meta name="theme-color" content="#080808">
<title>BountyMaster — Private Edition</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22BountyMaster%22,%22short_name%22:%22BM%22,%22display%22:%22standalone%22,%22background_color%22:%22%23080808%22,%22theme_color%22:%22%23f5a623%22}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #080808;
  --bg2: #0f0f0f;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: #242424;
  --border2: #2e2e2e;
  --orange: #f5a623;
  --orange2: #ff8c00;
  --orange-glow: rgba(245,166,35,0.15);
  --orange-dim: #c47d0e;
  --red: #ff4545;
  --green: #3ddc84;
  --text: #f0ede8;
  --text2: #a09890;
  --text3: #585450;
  --white: #ffffff;
  --radius: 14px;
  --radius-sm: 8px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

[data-theme="light"] {
  --bg: #f5f2ee;
  --bg2: #ede9e4;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #e0dbd4;
  --border2: #d0c9c0;
  --text: #1a1714;
  --text2: #6b6460;
  --text3: #a09890;
  --orange-glow: rgba(245,166,35,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
}

/* GRAIN OVERLAY */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.5;
}

/* ORANGE AMBIENT GLOW */
.glow-orb {
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(245,166,35,0.06) 0%, transparent 70%);
  border-radius: 50%;
  top: -200px;
  right: -200px;
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background var(--transition);
}

[data-theme="light"] .header {
  background: rgba(245,242,238,0.92);
}

.logo-mark {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 34px;
  height: 34px;
  background: var(--orange);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 800;
  color: #000;
  letter-spacing: -1px;
  flex-shrink: 0;
}

.logo-text {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.logo-text span { color: var(--orange); }

.logo-badge {
  font-size: 8px;
  background: var(--orange-glow);
  border: 1px solid var(--orange);
  color: var(--orange);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  margin-left: 2px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all var(--transition);
}

.icon-btn:hover { border-color: var(--orange); color: var(--orange); }
.icon-btn.active { background: var(--orange-glow); border-color: var(--orange); color: var(--orange); }

/* MAIN */
.main {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 100px;
  position: relative;
  z-index: 1;
}

/* SCREENS */
.screen { display: none; }
.screen.active { display: block; animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1); }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* DASHBOARD HERO */
.hero {
  margin-bottom: 32px;
  padding: 32px 0 0;
}

.hero-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--orange);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.hero-eyebrow::before {
  content: '';
  width: 20px;
  height: 1px;
  background: var(--orange);
}

.hero-title {
  font-size: clamp(36px, 8vw, 52px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -2px;
  margin-bottom: 8px;
}

.hero-title .accent {
  color: var(--orange);
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
}

.hero-sub {
  font-size: 14px;
  color: var(--text2);
  font-weight: 400;
  line-height: 1.6;
  max-width: 400px;
}

/* STATS */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-bottom: 28px;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  transition: border-color var(--transition);
}

.stat:hover { border-color: var(--border2); }

.stat-n {
  font-size: 28px;
  font-weight: 800;
  color: var(--orange);
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-l {
  font-size: 11px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* SECTION LABEL */
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* TOOL GRID */
.tool-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 28px;
}

.tool-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 16px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.tool-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--orange-glow);
  opacity: 0;
  transition: opacity var(--transition);
  border-radius: var(--radius);
}

.tool-card:hover { border-color: var(--orange); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(245,166,35,0.08); }
.tool-card:hover::after { opacity: 1; }
.tool-card:active { transform: translateY(0); }

.tool-card-icon {
  font-size: 22px;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}

.tool-card-name {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
  letter-spacing: -0.3px;
}

.tool-card-desc {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  font-weight: 400;
  position: relative;
  z-index: 1;
}

.tool-card-arrow {
  position: absolute;
  top: 16px;
  right: 16px;
  color: var(--text3);
  font-size: 14px;
  transition: all var(--transition);
  z-index: 1;
}

.tool-card:hover .tool-card-arrow { color: var(--orange); transform: translate(2px,-2px); }

/* CHATBOT */
.chat-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 28px;
}

.chat-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.chat-dot {
  width: 8px;
  height: 8px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.chat-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.chat-sub {
  font-size: 11px;
  color: var(--text2);
  font-weight: 400;
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
}

.chat-messages {
  height: 280px;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.6;
  font-weight: 400;
  animation: msgIn 0.2s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-user {
  background: var(--orange);
  color: #000;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
  font-weight: 600;
}

.msg-bot {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  white-space: pre-wrap;
}

.msg-loading {
  background: var(--surface2);
  border: 1px solid var(--border);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 14px;
}

.dot-bounce {
  width: 6px;
  height: 6px;
  background: var(--text3);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}

.dot-bounce:nth-child(2) { animation-delay: 0.2s; }
.dot-bounce:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-6px); }
}

.chat-input-row {
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Syne', sans-serif;
  resize: none;
  outline: none;
  min-height: 40px;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color var(--transition);
}

.chat-input:focus { border-color: var(--orange); }
.chat-input::placeholder { color: var(--text3); }

.chat-send {
  width: 40px;
  height: 40px;
  background: var(--orange);
  border: none;
  border-radius: 10px;
  color: #000;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
  font-weight: 700;
}

.chat-send:hover { background: var(--orange2); transform: scale(1.05); }
.chat-send:active { transform: scale(0.95); }

.chat-voice-btn {
  width: 40px;
  height: 40px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
}

.chat-voice-btn:hover { border-color: var(--orange); color: var(--orange); }
.chat-voice-btn.recording { background: rgba(255,69,69,0.15); border-color: var(--red); color: var(--red); animation: recordPulse 1s infinite; }

@keyframes recordPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,69,69,0.3); }
  50% { box-shadow: 0 0 0 6px rgba(255,69,69,0); }
}

/* TOOL SCREENS */
.tool-header {
  padding: 24px 0 20px;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
  margin-bottom: 16px;
  transition: color var(--transition);
  padding: 0;
}

.back-btn:hover { color: var(--orange); }

.tool-name {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1.1;
  margin-bottom: 6px;
}

.tool-name .accent { color: var(--orange); font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; }

.tool-desc { font-size: 13px; color: var(--text2); font-weight: 400; line-height: 1.6; }

/* FORMS */
.field { margin-bottom: 18px; }

.field-label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--orange);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.field-input, .field-textarea, .field-select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Syne', sans-serif;
  outline: none;
  transition: border-color var(--transition);
}

.field-input:focus, .field-textarea:focus { border-color: var(--orange); }
.field-textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
.field-hint { font-size: 11px; color: var(--text3); margin-top: 5px; font-style: italic; }

/* VOICE INPUT ROW */
.input-with-voice {
  position: relative;
}

.voice-field-btn {
  position: absolute;
  bottom: 10px;
  right: 10px;
  width: 30px;
  height: 30px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}

.voice-field-btn:hover { border-color: var(--orange); color: var(--orange); }
.voice-field-btn.recording { border-color: var(--red); color: var(--red); }

/* TAGS */
.tag-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

.tag {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: all var(--transition);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.5px;
}

.tag:hover { border-color: var(--orange); color: var(--orange); }
.tag.on { border-color: var(--orange); background: var(--orange-glow); color: var(--orange); }

/* BUTTONS */
.btn-primary {
  width: 100%;
  background: var(--orange);
  color: #000;
  border: none;
  border-radius: var(--radius-sm);
  padding: 15px 24px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all var(--transition);
  margin-top: 8px;
}

.btn-primary:hover { background: var(--orange2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(245,166,35,0.25); }
.btn-primary:active { transform: translateY(0); box-shadow: none; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

/* OUTPUT */
.output {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-top: 16px;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
  display: none;
  font-weight: 400;
}

.output.show { display: block; animation: slideUp 0.3s ease; }

.output-loading {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border2);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* STORY BANK */
.story-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

.story-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.story-body { flex: 1; }
.story-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
.story-text { font-size: 12px; color: var(--text2); line-height: 1.6; font-weight: 400; }
.story-topic { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-top: 6px; }

.story-del {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 14px;
  padding: 2px;
  transition: color var(--transition);
  flex-shrink: 0;
}

.story-del:hover { color: var(--red); }

/* DEADLINE / HISTORY ITEMS */
.list-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
  transition: border-color var(--transition);
}

.list-item:hover { border-color: var(--border2); }

.list-info { flex: 1; min-width: 0; }
.list-name { font-size: 13px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-sub { font-size: 11px; color: var(--text2); font-family: 'JetBrains Mono', monospace; margin-top: 3px; }

.list-right { text-align: right; flex-shrink: 0; }
.list-prize { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.list-prize.green { color: var(--green); }
.list-time { font-size: 10px; font-family: 'JetBrains Mono', monospace; margin-top: 3px; }
.list-time.red { color: var(--red); }
.list-time.orange { color: var(--orange); }
.list-time.dim { color: var(--text3); }

.badge {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.badge-win { background: rgba(61,220,132,0.12); color: var(--green); border: 1px solid rgba(61,220,132,0.3); }
.badge-loss { background: rgba(255,69,69,0.1); color: var(--red); border: 1px solid rgba(255,69,69,0.2); }
.badge-pending { background: var(--orange-glow); color: var(--orange); border: 1px solid rgba(245,166,35,0.3); }

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
}

.empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }

/* ADD BTN */
.add-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border2);
  border-radius: var(--radius-sm);
  padding: 14px;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
}

.add-btn:hover { border-color: var(--orange); color: var(--orange); }

/* MODAL */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: none;
  align-items: flex-end;
  padding: 20px;
}

.modal-bg.show { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
